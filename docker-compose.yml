version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: kairo_postgres
    environment:
      POSTGRES_USER: kairo_user
      POSTGRES_PASSWORD: kairo_password
      POSTGRES_DB: kairo_studio
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: kairo_redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data:
